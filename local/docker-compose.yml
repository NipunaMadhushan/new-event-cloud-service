services:
  postgres:
    image: postgres:16-alpine
    container_name: new-event-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: new_event
      POSTGRES_USER: new_event
      POSTGRES_PASSWORD: new_event_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U new_event -d new_event"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
