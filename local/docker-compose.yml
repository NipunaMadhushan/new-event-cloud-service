services:
  postgres:
    image: postgres:16-alpine
    container_name: new-event-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: new_event
      POSTGRES_USER: new_event
      POSTGRES_PASSWORD: new_event_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U new_event -d new_event"]
      interval: 5s
      timeout: 5s
      retries: 10

  event-service:
    build: ../services/event-service
    container_name: event-service
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "-CdbHost=postgres"
      - "-CdbPort=5432"
      - "-CdbUser=new_event"
      - "-CdbPassword=new_event_dev_pw"
      - "-CdbName=new_event"
      - "-CservicePort=8081"
    ports:
      - "8081:8081"

  program-service:
    build: ../services/program-service
    container_name: program-service
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "-CdbHost=postgres"
      - "-CdbPort=5432"
      - "-CdbUser=new_event"
      - "-CdbPassword=new_event_dev_pw"
      - "-CdbName=new_event"
      - "-CservicePort=8082"
    ports:
      - "8082:8082"

  registration-service:
    build: ../services/registration-service
    container_name: registration-service
    depends_on:
      postgres:
        condition: service_healthy
      event-service:
        condition: service_started
    command:
      - "-CdbHost=postgres"
      - "-CdbPort=5432"
      - "-CdbUser=new_event"
      - "-CdbPassword=new_event_dev_pw"
      - "-CdbName=new_event"
      - "-CservicePort=8083"
      - "-CeventServiceUrl=http://event-service:8081"
    ports:
      - "8083:8083"

  # Official image, not bitnamilegacy — that swap is only needed for the EKS
  # deployment (see helm/clickhouse/values.yaml); locally the upstream image's
  # .sql init-script support just works.
  clickhouse:
    image: clickhouse/clickhouse-server:25.7
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
    volumes:
      - chdata:/var/lib/clickhouse
      - ./clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  analytics-service:
    build: ../services/analytics-service
    container_name: analytics-service
    depends_on:
      clickhouse:
        condition: service_healthy
    command:
      - "-CclickhouseHost=clickhouse"
      - "-CclickhousePort=8123"
      - "-CclickhouseUser=default"
      - "-CclickhousePassword="
      - "-CservicePort=8084"
    ports:
      - "8084:8084"

  frontend:
    build: ../frontend
    container_name: frontend
    depends_on:
      - event-service
      - registration-service
      - analytics-service
    ports:
      - "18080:80"

volumes:
  pgdata:
  chdata:
