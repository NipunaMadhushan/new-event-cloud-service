name: Update Program API Service

on:
  push:
    branches: [main]
    paths:
      - "services/program-service/**"
      - "helm/program-service/**"
      - "!services/program-service/Ballerina.toml"
  workflow_dispatch: {}

env:
  IMAGE_NAME: program-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase GHCR namespace
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker tag purely for human-readable reference in the GHCR package
      # list — the cluster deploy below still uses the commit SHA tag, which
      # stays the source of truth for rollbacks (see DEPLOYMENT_GUIDE.md §9).
      - name: Read package version from Ballerina.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' services/program-service/Ballerina.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/program-service
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME }}

  deploy:
    needs: build-and-push
    uses: ./.github/workflows/deploy-service.yml
    permissions:
      id-token: write
      contents: read
    with:
      service: program-service
      chartPath: helm/program-service
      containerPort: 8082
      imageTag: ${{ github.sha }}
    secrets: inherit

  update-version:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute next patch version
        id: bump
        run: |
          CURRENT=$(grep '^version = ' services/program-service/Ballerina.toml | sed -E 's/version = "(.*)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Bump version in Ballerina.toml
        run: |
          sed -i "s/^version = \"${{ steps.bump.outputs.current }}\"/version = \"${{ steps.bump.outputs.next }}\"/" services/program-service/Ballerina.toml

      # Left for manual review/merge on purpose. Ballerina.toml is excluded
      # from this workflow's path filter (see the `on.push.paths` block
      # above), so merging this PR does NOT retrigger a build+deploy — the
      # bumped version just takes effect starting from the next real
      # code/chart change.
      - name: Open PR to bump the version
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update program API service version to ${{ steps.bump.outputs.next }}"
          branch: bump-program-service-version
          title: "Update program API service version ${{ steps.bump.outputs.current }} -> ${{ steps.bump.outputs.next }}"
          body: |
            Automated patch version bump following a successful build of
            `program-service:${{ steps.bump.outputs.current }}` (commit ${{ github.sha }}).

            Merging this will NOT trigger a build/deploy (Ballerina.toml is excluded from this
            workflow's path filter) — the bumped version applies starting from the next real change.
          base: main
