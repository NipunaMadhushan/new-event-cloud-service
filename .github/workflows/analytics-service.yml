name: analytics-service CI

on:
  push:
    branches: [main]
    paths:
      - "services/analytics-service/**"
      - ".github/workflows/analytics-service.yml"
  workflow_dispatch: {}

env:
  IMAGE_NAME: analytics-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase GHCR namespace
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/analytics-service
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME }}

  deploy:
    needs: build-and-push
    uses: ./.github/workflows/deploy-service.yml
    with:
      service: analytics-service
      chart-path: helm/analytics-service
      container-port: 8084
      image-tag: ${{ github.sha }}
    secrets: inherit
