# Committed (unlike Config.toml, which is gitignored) — no secrets here.
# Baked into the runtime image via the Dockerfile and loaded through
# BAL_CONFIG_FILES, not -C command-line flags. This is deliberate: -C flags
# for these exact ballerinax.jaeger/ballerinax.prometheus keys crash-looped
# pods in production twice (error: "unused command line argument"),
# non-deterministically, on a pod restart -- a failure never reproduced
# outside the real cluster despite extensive local testing. A TOML file
# goes through a different config-loading path in the Ballerina runtime,
# so this is worth trying as a genuinely different delivery mechanism.
# See DEPLOYMENT_GUIDE.md §5.5/§5.6 for the full incident history.

[ballerina.observe]
metricsEnabled = true
metricsReporter = "prometheus"
tracingEnabled = true
tracingProvider = "jaeger"

[ballerinax.prometheus]
port = 9797
host = "0.0.0.0"

[ballerinax.jaeger]
agentHostname = "otel-collector.observability.svc.cluster.local"
agentPort = 4317
