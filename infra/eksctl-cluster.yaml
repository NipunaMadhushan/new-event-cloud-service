apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: new-event-cluster
  region: us-east-1
  version: "1.30"
managedNodeGroups:
  - name: ng-1
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    availabilityZones: ["us-east-1a", "us-east-1b"]
    volumeSize: 20
    ssh:
      allow: false
