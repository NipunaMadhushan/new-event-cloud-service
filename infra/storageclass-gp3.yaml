# Replaces the broken default: the cluster only ships the legacy "gp2"
# StorageClass pointing at the in-tree kubernetes.io/aws-ebs provisioner, which
# was removed from Kubernetes entirely by 1.30 (this cluster's version).
# This one uses the EBS CSI driver addon instead, and is marked default so any
# PVC that doesn't specify a storageClassName (ClickHouse, and later the
# observability stack) picks it up automatically.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
parameters:
  type: gp3
