{{- range $slot, $cfg := .Values.slots }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Chart.Name }}-{{ $slot }}
  labels:
    app: {{ $.Chart.Name }}
    slot: {{ $slot }}
spec:
  replicas: {{ $cfg.replicas }}
  selector:
    matchLabels:
      app: {{ $.Chart.Name }}
      slot: {{ $slot }}
  template:
    metadata:
      labels:
        app: {{ $.Chart.Name }}
        slot: {{ $slot }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: {{ $.Chart.Name }}
                    slot: {{ $slot }}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: {{ $.Chart.Name }}
          image: "{{ $.Values.image.repository }}:{{ $cfg.tag }}"
          ports:
            - containerPort: {{ $.Values.containerPort }}
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.clickhouse.secretName }}
                  key: {{ $.Values.clickhouse.secretKey }}
          args:
            - "-CclickhouseHost={{ $.Values.clickhouse.host }}"
            - "-CclickhousePort={{ $.Values.clickhouse.port }}"
            - "-CclickhouseUser={{ $.Values.clickhouse.user }}"
            - "-CclickhousePassword=$(CLICKHOUSE_PASSWORD)"
            - "-CservicePort={{ $.Values.containerPort }}"
            # See helm/event-service/templates/deployment.yaml for why this points
            # at the OTel Collector's otlp receiver despite the "jaeger" name.
            - "-Cballerina.observe.tracingEnabled=true"
            - "-Cballerina.observe.tracingProvider=jaeger"
            - "-Cballerinax.jaeger.agentHostname=otel-collector.observability.svc.cluster.local"
            - "-Cballerinax.jaeger.agentPort=4317"
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ $.Values.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $.Values.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
---
{{- end }}
