# See helm/event-service/values.yaml for the blue/green design notes — same
# pattern here, plus eventServiceUrl (calls event-service's /reserve endpoint
# on every registration — same pattern already verified locally via
# docker-compose's container-name DNS, just K8s Service DNS instead).

image:
  repository: ghcr.io/nipunamadhushan/registration-service

activeSlot: blue

slots:
  blue:
    tag: latest
    replicas: 1
  green:
    tag: latest
    replicas: 1

containerPort: 8083
servicePort: 8083

database:
  secretName: new-event-db-credentials

# event-service's stable Service, same "app" namespace — resolves directly.
eventServiceUrl: http://event-service:8081

# API Gateway invoke URL fronting the seat-threshold-notifier Lambda (§7.1).
# Left blank until that Lambda is deployed — set via `--set notifierUrl=...`
# at install/upgrade time rather than committing the real URL here.
notifierUrl: ""

resources:
  requests:
    cpu: 100m
    memory: 160Mi
  limits:
    cpu: 400m
    memory: 320Mi

autoscaling:
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
