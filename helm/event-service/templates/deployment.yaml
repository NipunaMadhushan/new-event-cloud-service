{{- range $slot, $cfg := .Values.slots }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Chart.Name }}-{{ $slot }}
  labels:
    app: {{ $.Chart.Name }}
    slot: {{ $slot }}
spec:
  replicas: {{ $cfg.replicas }}
  selector:
    matchLabels:
      app: {{ $.Chart.Name }}
      slot: {{ $slot }}
  template:
    metadata:
      labels:
        app: {{ $.Chart.Name }}
        slot: {{ $slot }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: {{ $.Chart.Name }}
                    slot: {{ $slot }}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: {{ $.Chart.Name }}
          image: "{{ $.Values.image.repository }}:{{ $cfg.tag }}"
          ports:
            - containerPort: {{ $.Values.containerPort }}
            - name: metrics
              containerPort: 9797
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.database.secretName }}
                  key: dbHost
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.database.secretName }}
                  key: dbPort
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.database.secretName }}
                  key: dbUser
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.database.secretName }}
                  key: dbPassword
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.database.secretName }}
                  key: dbName
          args:
            - "-CdbHost=$(DB_HOST)"
            - "-CdbPort=$(DB_PORT)"
            - "-CdbUser=$(DB_USER)"
            - "-CdbPassword=$(DB_PASSWORD)"
            - "-CdbName=$(DB_NAME)"
            - "-CservicePort={{ $.Values.containerPort }}"
            # Verified against the actual built Docker image (not just host `bal`/`java`)
            # before rolling out, after the tracing config's "unused command line
            # argument" incident — see DEPLOYMENT_GUIDE.md §5.5/§5.6.
            - "-Cballerina.observe.metricsEnabled=true"
            - "-Cballerina.observe.metricsReporter=prometheus"
            - "-Cballerinax.prometheus.port=9797"
            - "-Cballerinax.prometheus.host=0.0.0.0"
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ $.Values.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $.Values.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
---
{{- end }}
