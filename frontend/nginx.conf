server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # K8s liveness/readiness probe target — kept out of access logs.
    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
