server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # K8s liveness/readiness probe target — kept out of access logs.
    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Proxied so the browser only ever talks to one origin (no CORS needed) —
    # this mirrors the path-based routing the K8s ingress will do later,
    # just backed by container-name DNS instead of K8s Service DNS for now.
    location /api/events {
        proxy_pass http://event-service:8081/events;
        proxy_set_header Host $host;
    }

    location /api/registrations {
        proxy_pass http://registration-service:8083/registrations;
        proxy_set_header Host $host;
    }

    location /api/programs {
        proxy_pass http://program-service:8082/programs;
        proxy_set_header Host $host;
    }
}
